name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Apply DB migrations (optional)
        if: ${{ secrets.TEST_SUPABASE_DB_CONN != '' }}
        env:
          TEST_SUPABASE_DB_CONN: ${{ secrets.TEST_SUPABASE_DB_CONN }}
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          for f in supabase/migrations/*.sql; do
            echo "Applying $f";
            psql "$TEST_SUPABASE_DB_CONN" -f "$f";
          done

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run integration tests (optional)
        if: ${{ secrets.TEST_API_SECRET != '' && secrets.NEXT_PUBLIC_SUPABASE_URL != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' && secrets.TEST_USER_ID != '' }}
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_API_SECRET: ${{ secrets.TEST_API_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_ID: ${{ secrets.TEST_USER_ID }}
        run: |
          npx vitest run test/integration --reporter verbose || true

      - name: Run E2E tests
        env:
          BASE_URL: http://127.0.0.1:3000
        run: |
          npx playwright test --reporter=list

  integration-tests:
    name: Integration Tests (conditional)
    runs-on: ubuntu-latest
    if: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' && secrets.TEST_API_SECRET != '' && secrets.NEXT_PUBLIC_SUPABASE_URL != '' && secrets.BASE_URL != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Install dependencies
        run: npm ci

      - name: Apply DB migrations (optional)
        if: ${{ secrets.TEST_SUPABASE_DB_CONN != '' }}
        env:
          TEST_SUPABASE_DB_CONN: ${{ secrets.TEST_SUPABASE_DB_CONN }}
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          for f in supabase/migrations/*.sql; do
            echo "Applying $f";
            psql "$TEST_SUPABASE_DB_CONN" -f "$f";
          done

      - name: Build app
        run: npm run build

      - name: Start app
        env:
          PORT: 3000
        run: |
          nohup npm run start &>/dev/null &
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:3000/ >/dev/null; then
              echo "server ready" && break
            fi
            sleep 1
          done

      - name: Run integration tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_API_SECRET: ${{ secrets.TEST_API_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_ID: ${{ secrets.TEST_USER_ID }}
        run: |
          npx vitest run test/integration --reporter verbose || true
